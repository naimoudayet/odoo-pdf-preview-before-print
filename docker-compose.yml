name: pdfprev-17

services:
  db:
    image: postgres:16
    container_name: pdfprev-pg-17
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data

  odoo:
    build: .
    container_name: pdfprev-odoo-17
    depends_on:
      - db
    ports:
      - "2017:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-data:/var/lib/odoo
      - ./no_pdf_preview_print:/mnt/extra-addons/no_pdf_preview_print

volumes:
  db-data:
  odoo-data:
