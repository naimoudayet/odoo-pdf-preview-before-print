services:
  odoo19:
    image: odoo:19.0
    container_name: odoo19_pdf_preview
    depends_on:
      - db19
    ports:
      - "2019:8069"
    volumes:
      - odoo19-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=db19
      - USER=odoo
      - PASSWORD=odoo
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]

  db19:
    image: postgres:16
    container_name: postgres19_pdf_preview
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo19-db-data:/var/lib/postgresql/data/pgdata
    ports:
      - "5519:5432"

volumes:
  odoo19-web-data:
  odoo19-db-data:
