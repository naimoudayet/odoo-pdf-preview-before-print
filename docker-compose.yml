name: pdfprev-16

services:
  db:
    image: postgres:15
    container_name: pdfprev-pg-16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data

  odoo:
    image: odoo:16
    container_name: pdfprev-odoo-16
    depends_on:
      - db
    ports:
      - "2016:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-data:/var/lib/odoo
      - ./pdf_preview_print:/mnt/extra-addons/pdf_preview_print

volumes:
  db-data:
  odoo-data:
